GitHub Workflow YAML

        
name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Start application
      run: npm start


      
Create a .github/workflows/deploy.yml file in your repository.
Paste the above YAML code into the file.
Customize the Start application step with your actual deployment commands if needed.
Commit and push the file to the main branch.
GitHub Actions will automatically run the workflow on each push to main.
